version: '3.8'

services:
  backend:
    build: .
    container_name: ai_meeting_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:nopass@postgres:5432/ai_meeting
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-change-this-in-production
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7
    container_name: ai_meeting_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15
    container_name: ai_meeting_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nopass
      POSTGRES_DB: ai_meeting
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
